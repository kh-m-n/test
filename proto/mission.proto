syntax = "proto3";

package mission;

service VehicleService {
  rpc AssignMission(Mission) returns (MissionAck);
  rpc GetVehicleStatus(VehicleStatusRequest) returns (VehicleStatus);
}

enum AreaType {
  AREA_TYPE_UNKNOWN = 0;
  LAND = 1;
  WATER = 2;
}

enum VehicleState {
  VEHICLE_STATE_UNKNOWN = 0;
  IDLE = 1;
  ASSIGNED = 2;
  BUSY = 3;
  COMPLETED = 4;
  ERROR = 5;
  CHARGING = 6;
}

message Position {
  int32 x = 1;
  int32 y = 2;
}

message Mission {
  string mission_id = 1;
  string incident_id = 2;
  string incident_type = 3;
  Position target_position = 4;
  int32 priority = 5;
  string assigned_vehicle_id = 6;
  AreaType area_type = 7;
}

message MissionAck {
  string mission_id = 1;
  string vehicle_id = 2;
  bool accepted = 3;
  string message = 4;
}

message VehicleStatusRequest {
  string vehicle_id = 1;
}

message VehicleStatus {
  string vehicle_id = 1;
  VehicleState state = 2;
  string assigned_mission_id = 3;
  int32 progress_percent = 4;
  string result = 5;
}

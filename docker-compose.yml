services:
  control-center:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.control_center.main"]
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.dashboard.main"]
    ports:
      - "8081:8080"           # Dashboard communicates with the control-center
    volumes:
      - .:/app

# Vehicles and sensors do not expose their ports to the host, as communication
# occurs internally between containers via service name and not between hosts.
  vehicle-drone:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.vehicles.drone"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  vehicle-rover:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.vehicles.rover"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  vehicle-boat:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.vehicles.boat"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  camera:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.camera"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  sensor-water:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.water"]
    depends_on:
      - control-center
    volumes:
      - .:/app

  sensor-vibration:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.sensors.vibration"]
    depends_on:
      - control-center
    volumes:
      - .:/app